<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light dark">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Forma Preço - formação de preço de venda com cálculo automático de tributos (PIS, COFINS, ICMS, Simples Nacional). Determine margem de lucro e preço ideal para seu negócio.">
    <meta name="keywords" content="calculadora de preço, formação de preço, cálculo de margem, tributação, PIS, COFINS, ICMS, Simples Nacional, lucro">
    <meta name="author" content="Maurilio Carmo">
    
    <title>Forma Preço - Cálculo de Margem e Tributos</title>
    
    <!-- Favicons -->
    <link rel="icon" type="image/png" href="./icons/favicons/favicon-96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="./icons/favicons/favicon.svg" />
    <link rel="icon" href="./icons/favicons/favicon-512.png" type="image/png">
    
    <!-- iOS - Apple Touch Icon -->
    <link rel="apple-touch-icon" href="./icons/favicons/favicon-192.png">
    
    <!-- iOS - Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Forma Preço">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#57b86a">
    
    <!-- DNS Prefetch -->
    <link rel="dns-prefetch" href="https://brasilapi.com.br">
    
    <!-- Tema aplicado antes do primeiro paint para evitar flash -->
    <script>
      if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    </script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css" />

    <!--
      Captura o beforeinstallprompt o mais cedo possível,
      antes dos módulos ES6 carregarem. O evento é disparado
      pelo browser logo no início e não pode ser perdido.
    -->
    <script>
      window.__pwaInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__pwaInstallPrompt = e;
      });
    </script>
</head>

<body>
    <!-- Header -->
    <div id="header-container"></div>

    <main class="container">
        <!-- Painel Esquerdo -->
        <div id="left-panel-container"></div>

        <!-- Painel Direito -->
        <div id="right-panel-container"></div>
    </main>

    <!-- Menu Lateral -->
    <div id="side-menu-container"></div>

    <!-- Modal de Perfil -->
    <div id="perfil-modal-container"></div>

    <!-- Modal de Tooltip -->
    <div id="tooltip-modal-container"></div>

    <!-- Footer -->
    <div id="footer-container"></div>

    <!-- Scripts -->
    <script type="module" src="src/main.js"></script>
</body>

</html>
