<!-- components/update-notification.html -->
<div id="updateNotification" class="update-notification" style="display: none;">
    <div class="update-content">
        <div class="update-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
            </svg>
        </div>
        <div class="update-text">
            <h3>Nova Versão Disponível</h3>
            <p>Uma atualização está pronta para ser instalada.</p>
            <div class="update-version-info">
                <span class="version-current">Atual: <strong id="currentVersion">v1.0.0</strong></span>
                <span class="version-arrow">→</span>
                <span class="version-new">Nova: <strong id="newVersion">v1.0.1</strong></span>
            </div>
        </div>
        <div class="update-actions">
            <button id="updateDismiss" class="btn-dismiss">Mais tarde</button>
            <button id="updateNow" class="btn-update">Atualizar agora</button>
        </div>
    </div>
</div>
