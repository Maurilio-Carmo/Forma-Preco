<!-- Overlay do Menu -->
<div id="menuOverlay" class="menu-overlay"></div>

<!-- Modal de Perfil -->
<div id="perfilModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Perfil da Loja</h2>
            <button class="modal-close" id="perfilClose">&times;</button>
        </div>
        <div class="modal-body">
            <form id="perfilForm">
                <div class="form-group">
                    <label for="cnpj" class="form-label required">CNPJ:</label>
                    <div class="input-with-icon">
                        <input type="text" id="cnpj" class="form-input" placeholder="00.000.000/0000-00" maxlength="18" required>
                        <button type="button" id="consultarCNPJ" class="input-icon-btn" title="Consultar CNPJ">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 485.213 485.213">
                                <g>
                                    <path fill="currentColor" d="M471.882,407.567L360.567,296.243c-16.586,25.795-38.536,47.734-64.331,64.321l111.324,111.324c17.772,17.768,46.587,17.768,64.321,0C489.654,454.149,489.654,425.334,471.882,407.567z"/>
                                    <path fill="currentColor" d="M363.909,181.955C363.909,81.473,282.44,0,181.956,0C81.474,0,0.001,81.473,0.001,181.955s81.473,181.951,181.955,181.951C282.44,363.906,363.909,282.437,363.909,181.955z M181.956,318.416c-75.252,0-136.465-61.208-136.465-136.46c0-75.252,61.213-136.465,136.465-136.465c75.25,0,136.468,61.213,136.468,136.465C318.424,257.208,257.206,318.416,181.956,318.416z"/>
                                    <path fill="currentColor" d="M75.817,181.955h30.322c0-41.803,34.014-75.814,75.816-75.814V75.816C123.438,75.816,75.817,123.437,75.817,181.955z"/>
                                </g>
                            </svg>
                        </button>
                    </div>
                    <span class="form-helper" id="cnpjStatus"></span>
                </div>

                <div class="form-group">
                    <label for="razaoSocial" class="form-label required">Razão Social:</label>
                    <input type="text" id="razaoSocial" class="form-input" required>
                </div>

                <div class="form-group">
                    <label for="nomeFantasia" class="form-label">Nome Fantasia:</label>
                    <input type="text" id="nomeFantasia" class="form-input">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="cep" class="form-label">CEP:</label>
                        <input type="text" id="cep" class="form-input" placeholder="00000-000" maxlength="9">
                    </div>
                    <div class="form-group">
                        <label for="uf" class="form-label">UF:</label>
                        <input type="text" id="uf" class="form-input" maxlength="2">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group" style="flex: 3;">
                        <label for="logradouro" class="form-label">Logradouro:</label>
                        <input type="text" id="logradouro" class="form-input">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="numero" class="form-label">Número:</label>
                        <input type="text" id="numero" class="form-input">
                    </div>
                </div>

                <div class="form-row">
                     <div class="form-group">
                        <label for="bairro" class="form-label">Bairro:</label>
                        <input type="text" id="bairro" class="form-input">
                    </div>                   
                    <div class="form-group">
                        <label for="municipio" class="form-label">Município:</label>
                        <input type="text" id="municipio" class="form-input">
                    </div>
                </div>

                <div class="form-group">
                    <label for="complemento" class="form-label">Complemento:</label>
                    <input type="text" id="complemento" class="form-input">
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="perfilCancel">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</div>
