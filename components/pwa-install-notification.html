<!-- Notificação de Instalação PWA -->
<div id="pwaInstallNotification" class="pwa-install-notification" style="display: none;">
    <div class="pwa-install-header">
        <div class="pwa-install-icon">📱</div>
        <div class="pwa-install-content">
            <div class="pwa-install-title">Instalar Aplicativo</div>
            <div class="pwa-install-message">
                Instale a calculadora no seu dispositivo para acesso rápido
            </div>
        </div>
        <button id="pwaInstallClose" class="pwa-install-close" aria-label="Fechar">&times;</button>
    </div>
    <div class="pwa-install-actions">
        <button id="pwaInstallBtn" class="pwa-install-btn">Instalar Agora</button>
        <button id="pwaInstallLaterBtn" class="pwa-install-btn-secondary">Depois</button>
    </div>
</div>
